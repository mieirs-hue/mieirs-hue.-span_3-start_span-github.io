name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint JavaScript syntax
        run: |
          node --check server.js
          node --check contact-form.js
          node --check deck-effects.js
          node --check services-checklist.js

      - name: Verify required site files
        run: |
          test -f index.html
          test -f services.html
          test -f contact.html
          test -f style.css
